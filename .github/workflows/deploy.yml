name: Build & Deploy lumiPOS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push da imagem
        run: |
          docker build \
            --file apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_SUPABASE_URL=https://qlcoawqrriygjobhkjhr.supabase.co \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsY29hd3Fycml5Z2pvYmhramhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyOTQ2NzAsImV4cCI6MjA5MTg3MDY3MH0.8Jl4Nsbh-HoBPJXkXgI1TCdF5ssUK8t5Kn1yNfpCSOI \
            --build-arg NEXT_PUBLIC_APP_URL=https://lumipos.com.br \
            --build-arg NEXT_PUBLIC_APP_NAME=lumiPOS \
            --tag ghcr.io/${{ github.repository_owner }}/lumipos:latest \
            --progress=plain \
            .
          docker push ghcr.io/${{ github.repository_owner }}/lumipos:latest

      - name: Atualizar stack no Portainer
        run: |
          # Obtém token de autenticação (Portainer 2.39+ usa /api/auth)
          TOKEN=$(curl -s -X POST https://portainer.iagenium.online/api/auth \
            -H "Content-Type: application/json" \
            -d '{"username":"chatbotgenium@gmail.com","password":"960d5aff6b33cb43c521531dcad3a5a2"}' \
            | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try{ process.stdout.write(JSON.parse(d).jwt||'') }catch(e){} })")
          if [ -z "$TOKEN" ]; then echo "❌ Falha ao obter token do Portainer"; exit 1; fi
          echo "✅ Token obtido"

          # Serializa o docker-compose como string JSON usando Node.js (sem python)
          STACK_JSON=$(node -e "
            const fs = require('fs');
            const content = fs.readFileSync('docker-compose.lumipOS.yml', 'utf8');
            process.stdout.write(JSON.stringify(content));
          ")

          RESULT=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            "https://portainer.iagenium.online/api/stacks/7?endpointId=1" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"stackFileContent\":${STACK_JSON},\"pullImage\":true}")
          echo "Portainer HTTP status: $RESULT"
          if [ "$RESULT" != "200" ]; then echo "❌ Falha ao atualizar stack ($RESULT)"; exit 1; fi
          echo "✅ Stack atualizado com sucesso!"
